<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 중고마켓</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
        }

        header {
            background-color: #ff6f0f;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .search-box input {
            padding: 8px;
            width: 250px;
            border-radius: 5px;
            border: none;
        }

        .container {
            padding: 20px;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .items {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .item {
            background: white;
            padding: 10px;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .item img {
            width: 100%;
            border-radius: 10px;
        }

        .price {
            color: #ff6f0f;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #ddd;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">🤖 AI 중고마켓</div>
    <div class="search-box">
        <input type="text" placeholder="AI가 추천해드려요 🔍">
    </div>
</header>

<div class="container">

    <!-- 일반 상품 -->
    <div>
        <div class="section-title">🔥 인기 상품</div>
        <div class="items">
            <div class="item">
                <img src="https://via.placeholder.com/200" alt="상품">
                <div>아이폰 13</div>
                <div class="price">700,000원</div>
            </div>

            <div class="item">
                <img src="https://via.placeholder.com/200" alt="상품">
                <div>맥북 프로</div>
                <div class="price">1,200,000원</div>
            </div>

            <div class="item">
                <img src="https://via.placeholder.com/200" alt="상품">
                <div>에어팟</div>
                <div class="price">150,000원</div>
            </div>
        </div>
    </div>

    <!-- AI 추천 -->
    <div style="margin-top:30px;">
        <div class="section-title">🤖 AI 추천 상품</div>
        <div class="items">
            <div class="item">
                <img src="https://via.placeholder.com/200" alt="상품">
                <div>갤럭시 S23</div>
                <div class="price">650,000원</div>
            </div>

            <div class="item">
                <img src="https://via.placeholder.com/200" alt="상품">
                <div>아이패드</div>
                <div class="price">500,000원</div>
            </div>
        </div>
    </div>

</div>

<footer>
    © 2026 AI 중고마켓 - 스마트한 거래
</footer>

</body>
</html>
