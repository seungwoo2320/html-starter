<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 대한민국 인구 통계 인포그래픽</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f39c12;
            --bg: #f4f7f6;
            --card: #ffffff;
            --text: #333;
        }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .card h3 { margin: 0; font-size: 0.9rem; color: #666; }
        .card p { font-size: 1.5rem; font-weight: bold; margin: 10px 0 0; color: var(--primary); }

        .chart-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        @media (max-width: 900px) { .chart-container { grid-template-columns: 1fr; } }
        
        .chart-box {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            font-size: 0.85rem;
        }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; text-align: center; }
        td:first-child { text-align: center; font-weight: bold; }
        .highlight-row { background-color: #f0f7ff; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📊 2025 대한민국 지역별 인구 리포트</h1>
        <p>전국 총 인구 및 외국인 현황 분석</p>
    </header>

    <div class="summary-grid">
        <div class="card">
            <h3>전국 총인구</h3>
            <p id="total-pop">51,851,327 명</p>
        </div>
        <div class="card">
            <h3>최다 인구 지역</h3>
            <p>경기도 (1,422만)</p>
        </div>
        <div class="card">
            <h3>총 외국인 수</h3>
            <p id="total-foreign">1,541,833 명</p>
        </div>
        <div class="card">
            <h3>남녀 성비 (총계)</h3>
            <p>98.7 (여성 100명당 남성)</p>
        </div>
    </div>

    <div class="chart-container">
        <div class="chart-box">
            <canvas id="popChart"></canvas>
        </div>
        <div class="chart-box">
            <canvas id="foreignChart"></canvas>
        </div>
    </div>

    <div class="chart-box" style="overflow-x: auto;">
        <h3>📍 상세 통계 데이터</h3>
        <table id="statTable">
            <thead>
                <tr>
                    <th>지역</th>
                    <th>총인구</th>
                    <th>한국인</th>
                    <th>외국인</th>
                    <th>세대수</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script>
    const rawData = [
        {name: "서울", total: 9579177, kor: 9299548, foreign: 279629, households: 4501031},
        {name: "부산", total: 3310036, kor: 3241600, foreign: 68436, households: 1573996},
        {name: "대구", total: 2393056, kor: 2353032, foreign: 40024, households: 1112508},
        {name: "인천", total: 3147007, kor: 3051961, foreign: 95046, households: 1400788},
        {name: "광주", total: 1420434, kor: 1392013, foreign: 28421, households: 658450},
        {name: "대전", total: 1469093, kor: 1440729, foreign: 28364, households: 697348},
        {name: "울산", total: 1122123, kor: 1091948, foreign: 30175, households: 499304},
        {name: "세종", total: 398536, kor: 391965, foreign: 6571, households: 165220},
        {name: "경기", total: 14222954, kor: 13730135, foreign: 492819, households: 6121301},
        {name: "강원", total: 1537995, kor: 1508500, foreign: 29495, households: 768900},
        {name: "충북", total: 1658715, kor: 1596502, foreign: 62213, households: 797797},
        {name: "충남", total: 2243502, kor: 2136753, foreign: 106749, households: 1062282},
        {name: "전북", total: 1773933, kor: 1724856, foreign: 49077, households: 868116},
        {name: "전남", total: 1844833, kor: 1779135, foreign: 65698, households: 913284},
        {name: "경북", total: 2594539, kor: 2506526, foreign: 88013, households: 1295685},
        {name: "경남", total: 3320572, kor: 3207383, foreign: 113189, households: 1548615},
        {name: "제주", total: 693300, kor: 664792, foreign: 28508, households: 315462}
    ];

    // 테이블 렌더링
    const tbody = document.querySelector('#statTable tbody');
    rawData.forEach(d => {
        const row = `<tr>
            <td>${d.name}</td>
            <td>${d.total.toLocaleString()}</td>
            <td>${d.kor.toLocaleString()}</td>
            <td>${d.foreign.toLocaleString()}</td>
            <td>${d.households.toLocaleString()}</td>
        </tr>`;
        tbody.innerHTML += row;
    });

    // 막대 그래프 (총 인구)
    new Chart(document.getElementById('popChart'), {
        type: 'bar',
        data: {
            labels: rawData.map(d => d.name),
            datasets: [{
                label: '지역별 총 인구 (명)',
                data: rawData.map(d => d.total),
                backgroundColor: '#4a90e2'
            }]
        },
        options: { responsive: true, plugins: { title: { display: true, text: '시도별 인구 규모' } } }
    });

    // 파이 차트 (외국인 비중 상위 5)
    const topForeign = [...rawData].sort((a,b) => b.foreign - a.foreign).slice(0, 5);
    new Chart(document.getElementById('foreignChart'), {
        type: 'doughnut',
        data: {
            labels: topForeign.map(d => d.name),
            datasets: [{
                data: topForeign.map(d => d.foreign),
                backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF']
            }]
        },
        options: { responsive: true, plugins: { title: { display: true, text: '외국인 거주 상위 5지역' } } }
    });
</script>

</body>
</html>
