<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 시·도별 인구 통계</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
        google.charts.load('current', {'packages':['corechart']});
        google.charts.setOnLoadCallback(drawCharts);

        function drawCharts() {
            const data = google.visualization.arrayToDataTable([
                ['지역', '총인구'],
                ['서울', 9579177],
                ['부산', 3310036],
                ['대구', 2393056],
                ['인천', 3147007],
                ['광주', 1420434],
                ['대전', 1469093],
                ['울산', 1122123],
                ['세종', 398536],
                ['경기', 14222954],
                ['강원', 1537995],
                ['충북', 1658715],
                ['충남', 2243502],
                ['전북', 1773933],
                ['전남', 1844833],
                ['경북', 2594539],
                ['경남', 3320572],
                ['제주', 693300]
            ]);

            const options = {
                title: '2025 시·도별 총인구 통계',
                is3D: true,
            };

            const chart = new google.visualization.PieChart(document.getElementById('piechart'));
            chart.draw(data, options);
        }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        #piechart {
            width: 90%;
            height: 500px;
            margin: auto;
        }
    </style>
</head>
<body>
    <h1>2025 시·도별 총인구 통계</h1>
    <div id="piechart"></div>
</body>
</html>
